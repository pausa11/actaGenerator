name: Keep Alive - Prince Service

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://prince-service.onrender.com/health)
          echo "Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "WARN: El servicio respondió con status $STATUS"
            exit 1
          fi
          echo "OK: Servicio activo"
